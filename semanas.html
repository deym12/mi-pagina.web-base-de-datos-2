<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Unidades - Base de Datos II</title>

<style>

/* 🎨 PALETA GLOBAL */
:root{
--bg-main:#020617;
--bg-secondary:#0f172a;
--card-bg:rgba(15,23,42,0.7);

--primary:#38bdf8;
--secondary:#a855f7;

--text-main:#e2e8f0;
--text-soft:#cbd5f5;
--text-muted:#94a3b8;

--border:rgba(56,189,248,0.2);
--glow:rgba(56,189,248,0.4);
}

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',sans-serif;
background: radial-gradient(circle at top, var(--bg-secondary), var(--bg-main));
color:var(--text-main);
}

/* 🔥 FONDO MATRIX */
#matrix{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-10;
}

/* NAVBAR */
.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 60px;
background:rgba(2,6,23,0.85);
backdrop-filter:blur(10px);
border-bottom:1px solid var(--border);
z-index:1000;
}

/* LOGO */
.logo{
display:flex;
align-items:center;
gap:15px;
}

.logo-box{
background:#fff;
padding:6px;
border-radius:10px;
box-shadow:0 0 15px var(--glow);
}

.logo-box img{
width:45px;
}

.logo-text h2{
color:var(--primary);
}

.logo-text p{
color:var(--text-soft);
font-size:13px;
}

.logo-text span{
color:var(--text-muted);
font-size:11px;
}

/* MENU */
nav a{
margin-left:25px;
color:var(--text-soft);
text-decoration:none;
transition:0.3s;
}

nav a:hover{
color:var(--primary);
text-shadow:0 0 8px var(--primary);
}

nav .active{
color:var(--primary);
}

/* CONTENEDOR */
.semanas-container{
width:90%;
max-width:1200px;
margin:120px auto 40px;

background:var(--card-bg);
padding:30px;
border-radius:18px;
border:1px solid var(--border);
backdrop-filter:blur(10px);
box-shadow:0 0 30px var(--glow);
}

h1{
text-align:center;
margin-bottom:30px;
color:var(--primary);
}

/* UNIDADES */
.unidad{
margin-top:35px;
padding:18px;
text-align:center;
border-radius:12px;

background:rgba(2,6,23,0.7);
border:1px solid var(--border);

box-shadow:0 0 15px var(--glow);
transition:0.3s;
}

.unidad:hover{
box-shadow:0 0 25px var(--primary);
}

.unidad-numero{
font-size:14px;
color:var(--text-muted);
margin-bottom:5px;
letter-spacing:1px;
}

.unidad-nombre{
font-size:20px;
font-weight:bold;
color:var(--primary);
text-shadow:0 0 10px var(--primary);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit, minmax(220px,1fr));
gap:20px;
margin-top:15px;
}

/* TARJETAS */
.card{
background:rgba(2,6,23,0.85);
border-radius:12px;
padding:20px;
text-align:center;
cursor:pointer;
border:1px solid var(--border);

position:relative;
overflow:hidden;

transition:0.3s;
}

.card::before{
content:"";
position:absolute;
width:100%;
height:100%;
top:0;
left:-100%;
background:linear-gradient(120deg, transparent, rgba(56,189,248,0.4), transparent);
transition:0.5s;
}

.card:hover::before{
left:100%;
}

.card:hover{
transform:translateY(-6px) scale(1.04);
box-shadow:
0 0 10px var(--primary),
0 0 25px var(--glow);
border:1px solid var(--primary);
}

.card h3{
color:var(--primary);
margin-bottom:5px;
}

.card p{
color:var(--text-muted);
font-size:13px;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
}

.modal-content{
background:var(--card-bg);
padding:40px;
width:60%;
border-radius:20px;
position:relative;
border:1px solid var(--border);
box-shadow:0 0 30px var(--glow);
}

.close{
position:absolute;
top:15px;
right:20px;
cursor:pointer;
color:var(--primary);
font-size:20px;
}

.btn-ver{
border:1px solid var(--primary);
padding:6px 12px;
border-radius:6px;
color:var(--primary);
text-decoration:none;
transition:0.3s;
}

.btn-ver:hover{
background:var(--primary);
color:#020617;
}

.modal-item{
margin:15px 0;
padding:15px;
background:rgba(2,6,23,0.8);
border-radius:12px;
display:flex;
justify-content:space-between;
align-items:center;
border:1px solid var(--border);
}

</style>
</head>

<body>

<!-- 🔥 CANVAS FONDO -->
<canvas id="matrix"></canvas>

<header class="navbar">

<div class="logo">

<div class="logo-box">
<img src="logo.png">
</div>

<div class="logo-text">
<h2>Base de Datos II</h2>
<p>Guadalupe Carbajal Emanuel Gaddiel</p>
<span>UPLA - Huancayo</span>
</div>

</div>

<nav>
<a href="index.html">🏠 Inicio</a>
<a href="#" class="active">📅 Unidades</a>
<a href="contacto.html">✉️ Contacto</a>
<a href="login.html">🔒 Login</a>
</nav>

</header>

<section class="semanas-container">
<h1>Actividades por Semanas</h1>
<div id="contenido"></div>
</section>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<span class="close" onclick="cerrarModal()">✖</span>
<h2 id="tituloModal"></h2>
<div id="linksModal"></div>
</div>
</div>

<script>

/* MATRIX */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01アカサタナハマヤラワABCDEFGHIJKLMNOPQRSTUVWXYZ";
const fontSize = 14;
const columns = canvas.width / fontSize;

const drops = [];

for(let i=0;i<columns;i++){
drops[i]=1;
}

function draw(){
ctx.fillStyle = "rgba(2,6,23,0.08)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle = "#38bdf8";
ctx.font = fontSize + "px monospace";

for(let i=0;i<drops.length;i++){
const text = letters[Math.floor(Math.random()*letters.length)];
ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize > canvas.height && Math.random()>0.975){
drops[i]=0;
}

drops[i]++;
}
}

setInterval(draw,33);

window.addEventListener("resize",()=>{
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
});

/* TU JS ORIGINAL */
const BASE_URL = "https://cdn.jsdelivr.net/gh/GuadalupeEmanuel/BASE-DE-DATOS-II@main/";

const semanas = {
1:[{nombre:"Arquitectura de Base de Datos",archivo:"semana1/semana11.pdf"}],
2:[
{nombre:"Análisis Técnico",archivo:"semana2/semana2.pdf"},
{nombre:"Diagrama",archivo:"semana2/semana22.pdf"},
{nombre:"Instalación de SQL",archivo:"semana2/semana222.pdf"},
{nombre:"Diagrama 2",archivo:"semana2/semana2222.pdf"}
],
3:[
{nombre:"Ejercicio 1",archivo:"semana3/semana3.pdf"},
{nombre:"Ejercicio 2",archivo:"semana3/semana33.pdf"},
],
4:[{nombre:"Modelo Entidad-Relación",archivo:"semana4/semana4.pdf"}],
5:[{nombre:"Normalización de Datos",archivo:"semana5/semana5.pdf"}],
6:[{nombre:"Álgebra Relacional",archivo:"semana6/semana6.pdf"}],
7:[{nombre:"SQL Básico",archivo:"semana7/semana7.pdf"}],
8:[{nombre:"SQL Avanzado",archivo:"semana8/semana8.pdf"}],
9:[{nombre:"Procedimientos",archivo:"semana9/semana9.pdf"}],
10:[{nombre:"Triggers",archivo:"semana10/semana10.pdf"}],
11:[{nombre:"Funciones",archivo:"semana11/semana11.pdf"}],
12:[{nombre:"Transacciones",archivo:"semana12/semana12.pdf"}],
13:[{nombre:"Seguridad",archivo:"semana13/semana13.pdf"}],
14:[{nombre:"Optimización",archivo:"semana14/semana14.pdf"}],
15:[{nombre:"Administración BD",archivo:"semana15/semana15.pdf"}],
16:[{nombre:"Proyecto Final",archivo:"semana16/semana16.pdf"}]
};

const contenedor=document.getElementById("contenido");

const unidades=[
{nombre:"Arquitectura de Base de Datos",inicio:1,fin:4},
{nombre:"Diseño y Modelado",inicio:5,fin:8},
{nombre:"Implementación SQL",inicio:9,fin:12},
{nombre:"Administración y Seguridad",inicio:13,fin:16}
];

unidades.forEach((u,index)=>{

let html=`
<div class="unidad">
<div class="unidad-numero">📘 Unidad ${index+1}</div>
<div class="unidad-nombre">${u.nombre}</div>
</div>
`;

html+=`<div class="grid">`;

for(let i=u.inicio;i<=u.fin;i++){
html+=`
<div class="card" onclick="abrirModal(${i})">
<h3>Semana ${i}</h3>
<p>Ver archivos</p>
</div>
`;
}

html+=`</div>`;
contenedor.innerHTML+=html;

});

function abrirModal(semana){
const modal=document.getElementById("modal");
modal.style.display="flex";

let contenido="";

if(semanas[semana]){
semanas[semana].forEach(file=>{
let url=BASE_URL+file.archivo;

contenido+=`
<div class="modal-item">
<div><b>📄 ${file.nombre}</b></div>
<a href="${url}" target="_blank" class="btn-ver">👁 Ver</a>
</div>
`;
});
}else{
contenido="<p>No hay archivos</p>";
}

document.getElementById("tituloModal").innerHTML="📅 Semana "+semana;
document.getElementById("linksModal").innerHTML=contenido;
}

function cerrarModal(){
document.getElementById("modal").style.display="none";
}

window.onclick=function(e){
const modal=document.getElementById("modal");
if(e.target===modal){
modal.style.display="none";
}
}

</script>

</body>
</html>
